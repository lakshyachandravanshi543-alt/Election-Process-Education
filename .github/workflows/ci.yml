name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Check Code Quality (Linting)
      run: |
        # Only check syntax errors and undefined names to avoid failing on strict style rules at the last minute
        pylint -E app.py services/gemini_service.py test_app.py test_gemini_service.py

    - name: Run Test Suite
      env:
        FLASK_SECRET_KEY: test_secret_key
      run: |
        pytest -v
